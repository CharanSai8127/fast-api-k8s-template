apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: grafana-dashboards
    files:
      - dashboards/python-app.json
      - dashboards/postgres.json
      - dashboards/gateway.json
      - dashboards/events.json

generatorOptions:
  disableNameSuffixHash: true
